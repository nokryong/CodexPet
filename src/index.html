<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desktop Pet</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!--
      #pet은 192x208 크기의 투명 클릭 영역입니다.
      Canvas draws the current spritesheet row/column frame.
    -->
    <div id="pet" aria-label="Desktop pet">
      <canvas id="pet-canvas"></canvas>
    </div>
    <div id="resize-handle">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: block; width: 100%; height: 100%;">
        <line x1="21" y1="15" x2="15" y2="21"></line>
        <line x1="21" y1="8" x2="8" y2="21"></line>
      </svg>
    </div>

    <!-- spritesheet.webp가 없거나 로드 실패하면 이 메시지 영역을 표시합니다. -->
    <div id="error" hidden></div>

    <script src="./sprite-layout.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
