<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Pet Bubble</title>
    <style>
      /* 말풍선 창은 펫 창과 별개의 투명 frameless 창입니다.
         본체(.bubble)와 아래쪽 꼬리(.tail)만 그려지고 나머지는 투명합니다. */
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        overflow: hidden;
        user-select: none;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
      }

      #root {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .bubble {
        box-sizing: border-box;
        width: calc(100% - 8px);
        background: rgba(28, 30, 38, 0.94);
        color: #f2f3f7;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 12px;
        padding: 10px 12px;
        font-size: 12px;
        line-height: 1.5;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
        cursor: pointer;
      }

      .tail {
        width: 0;
        height: 0;
        border-left: 8px solid transparent;
        border-right: 8px solid transparent;
        border-top: 9px solid rgba(28, 30, 38, 0.94);
      }

      .title {
        font-weight: 700;
        font-size: 12.5px;
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .title .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #6ee7a0;
        flex: none;
      }

      .title .dot.busy {
        background: #ffc94d;
        animation: pulse 1.1s ease-in-out infinite;
      }

      @keyframes pulse {
        50% { opacity: 0.3; }
      }

      .body-text {
        white-space: pre-wrap;
        word-break: break-word;
        color: #d8dbe4;
      }

      /* 사용량 게이지 */
      .gauge {
        margin-bottom: 8px;
      }

      .gauge:last-child {
        margin-bottom: 0;
      }

      .gauge .row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 3px;
      }

      .gauge .pct {
        font-weight: 700;
      }

      .gauge .bar {
        height: 6px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.14);
        overflow: hidden;
      }

      .gauge .fill {
        height: 100%;
        border-radius: 3px;
        background: #6ee7a0;
      }

      .gauge .fill.warn { background: #ffc94d; }
      .gauge .fill.danger { background: #ff7a6e; }

      .gauge .reset {
        margin-top: 3px;
        font-size: 11px;
        color: #9aa0ae;
      }

      .footer {
        margin-top: 8px;
        font-size: 10.5px;
        color: #8a909e;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="bubble" id="bubble"></div>
      <div class="tail"></div>
    </div>
    <script src="./bubble.js"></script>
  </body>
</html>
